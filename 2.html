function saveCustom(){try{localStorage.setItem('customStocks2',JSON.stringify(CUSTOM));}catch(e){}}
function addStock(gi){
  const g=DATA[gi];if(!g)return;
  let code=prompt('在「'+g.n+'」新增股號（數字，例如 2330）：');if(code==null)return;code=code.trim();
  if(!/^\d{3,6}[A-Za-z]?$/.test(code)){alert('股號格式不正確');return;}
  if(wanted.has(code)){alert('清單裡已經有 '+code+'，不重複新增');return;}
  let name='';
  try{if(typeof SRV_SNAP!=='undefined'&&SRV_SNAP[code]){name=SRV_SNAP[code][3]||'';if(SRV_SNAP[code][2])market[code]=SRV_SNAP[code][2];}}catch(e){}
  if(!name){name=(prompt('查不到股名，請手動輸入（可留空）：','')||'').trim();}
  (CUSTOM[g.n]=CUSTOM[g.n]||[]).push([code,name]);saveCustom();
  wanted.add(code);render();renderWatch();
  if(typeof yOne==='function'){yOne(code).then(function(){fill(code);});}else{fill(code);}
}
function removeStock(gi,code){
  const g=DATA[gi];if(!g)return;
  CUSTOM[g.n]=(CUSTOM[g.n]||[]).filter(c=>c[0]!==code);if(!CUSTOM[g.n].length)delete CUSTOM[g.n];saveCustom();
  wanted.delete(code);render();renderWatch();
}
const market = {}; Object.keys(SNAP).forEach(c=>market[c]=SNAP[c][2]);

function yurl2(code,page){return 'https://tw.stock.yahoo.com/quote/'+code+(market[code]||'')+'/'+page;}
function yurl(code){ return 'https://tw.stock.yahoo.com/quote/'+code+(market[code]||'')+'/technical-analysis'; }

function esc(t){return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');}

function render(){
  const main=document.getElementById('list');

  DATA.forEach((g,gi)=>{
    const _cust=(CUSTOM[g.n]||[]);
    h+=`<details id="cat${gi}" open data-g="${gi}"><summary><span class="code">${g.c}</span>${esc(g.n)}<span class="cnt">${g.s.length+_cust.length} 檔</span></summary>`;

        +`<td>${tag?`<span class="tag ${tag}">${tag}</span>`:''}</td>`
        +`<td class="num" data-p="${code}">…</td>`
        +`<td class="num" data-c="${code}"></td>`+`<td class="num" data-cp="${code}"></td>`

    });

  });

  document.querySelectorAll('input.tp').forEach(inp=>{
    const cls=inp.classList.contains('lo')?'lo':inp.classList.contains('av')?'av':'hi';
    try{
      let v=localStorage.getItem('tp3_'+cls+'_'+inp.dataset.code);
      if(v===null&&cls==='av')v=localStorage.getItem('tp_'+inp.dataset.code);
      if(v)inp.value=v;
      else if(typeof DEFAULT_TP3!=='undefined'&&DEFAULT_TP3[inp.dataset.code]&&DEFAULT_TP3[inp.dataset.code][cls]!=null)inp.value=DEFAULT_TP3[inp.dataset.code][cls];
    }catch(e){}

      try{localStorage.setItem('tp3_'+cls+'_'+inp.dataset.code,inp.value);}catch(e){}

function sortVal(tr,key){
  if(key==='price'){const c=tr.querySelector('[data-p]');if(!c)return null;const n=parseFloat(c.textContent.replace(/,/g,''));return isNaN(n)?null:n;}
  if(key==='chg'){const c=tr.querySelector('[data-c]');if(!c)return null;const t=c.textContent.trim();if(!t)return null;const sign=t[0]==='▼'?-1:1;const n=parseFloat(t.replace(/[▲▼,]/g,''));return isNaN(n)?null:sign*n;}
  if(key==='chgpct'){const c=tr.querySelector('[data-cp]');if(!c)return null;const t=c.textContent.replace('%','').trim();if(!t)return null;const n=parseFloat(t);return isNaN(n)?null:n;}
  if(key==='upside'){const c=tr.querySelector('[data-u]');if(!c)return null;const v={};c.querySelectorAll('.ustack>span').forEach(sp=>{const k=sp.querySelectorAll('span');if(k.length<2)return;const n=parseFloat(k[1].textContent.replace('%',''));v[k[0].textContent.trim()]=isNaN(n)?null:n;});
    if(v['均']!=null)return v['均'];const a=[v['低'],v['高']].filter(x=>x!=null);return a.length?a.reduce((p,q)=>p+q,0)/a.length:null;}
  return null;
}
function sortTable(th){
  const table=th.closest('table'),tb=table.querySelector('tbody'),key=th.dataset.key;
  const cur=table.dataset.sk===key?table.dataset.sd:'';
  const dir=cur===''?'desc':cur==='desc'?'asc':'';
  table.querySelectorAll('th.sortable').forEach(h=>h.classList.remove('asc','desc'));
  const rows=[...tb.children];
  if(dir===''){table.dataset.sk='';table.dataset.sd='';
    rows.sort((a,b)=>(+a.dataset.oi)-(+b.dataset.oi)).forEach(r=>tb.appendChild(r));return;}
  table.dataset.sk=key;table.dataset.sd=dir;th.classList.add(dir);
  rows.sort((a,b)=>{const va=sortVal(a,key),vb=sortVal(b,key);
    if(va===null&&vb===null)return(+a.dataset.oi)-(+b.dataset.oi);
    if(va===null)return 1;if(vb===null)return -1;
    return dir==='desc'?vb-va:va-vb;}).forEach(r=>tb.appendChild(r));

function rebuildAgg(K,r){
  const day=new Date(r.ts*1000);
  const dow=(day.getUTCDay()+6)%7;
  const wkTs=r.ts-dow*86400;
  const moTs=Date.UTC(r.y,r.m-1,1,1)/1000;
  for(const pair of [['w',wkTs],['m',moTs]]){
    const key=pair[0],startTs=pair[1],arr=K[key];
    if(!arr||!arr.length)continue;
    const days=K.d.filter(x=>x[0]>=startTs&&x[0]<=r.ts);
    if(!days.length)continue;
    const bar=[startTs,days[0][1],Math.max(...days.map(x=>x[2])),Math.min(...days.map(x=>x[3])),days[days.length-1][4],days.reduce((s,x)=>s+x[5],0)];
    const last=arr[arr.length-1];
    if(last[0]>=startTs)arr[arr.length-1]=bar;else arr.push(bar);
  }
}
function mergeDailyBars(bars){
  let upd=0,dateStr='';
  for(const cd in bars){
    const b=bars[cd],K=KDATA[cd];if(!K||!K.d||!K.d.length)continue;
    const r=rocTs(b.d);
    dateStr=r.y+'/'+String(r.m).padStart(2,'0')+'/'+String(r.d).padStart(2,'0');
    const bar=[r.ts,b.o,b.h,b.l,b.c,b.v];
    const last=K.d[K.d.length-1];
    if(last[0]===r.ts)K.d[K.d.length-1]=bar;
    else if(r.ts>last[0])K.d.push(bar);
    else continue;
    rebuildAgg(K,r);upd++;
    prices[cd]={close:b.c,chg:b.chg};pdate[cd]=dateStr;fill(cd);
  }
  return {upd:upd,dateStr:dateStr};
}

function csvParse(txt){
  const rows=[];let cur=[],s='',q=false;
  for(let i=0;i<txt.length;i++){const ch=txt[i];
    if(q){if(ch==='"'){if(txt[i+1]==='"'){s+='"';i++;}else q=false;}else s+=ch;}
    else if(ch==='"')q=true;
    else if(ch===','){cur.push(s);s='';}
    else if(ch==='\n'||ch==='\r'){if(s!==''||cur.length){cur.push(s);rows.push(cur);cur=[];s='';}}
    else s+=ch;}
  if(s!==''||cur.length){cur.push(s);rows.push(cur);}
  return rows;
}

      if(v)inp.value=v;
      else if(typeof DEFAULT_TP3!=='undefined'&&DEFAULT_TP3[inp.dataset.code]&&DEFAULT_TP3[inp.dataset.code][cls]!=null)inp.value=DEFAULT_TP3[inp.dataset.code][cls];
    }catch(e){}
    inp.addEventListener('input',()=>{
      try{localStorage.setItem('tp3_'+cls+'_'+inp.dataset.code,inp.value);}catch(e){}
      document.querySelectorAll(`input.tp.${cls}[data-code="${inp.dataset.code}"]`).forEach(o=>{if(o!==inp)o.value=inp.value;});
      upside(inp.dataset.code);
    });
  });
  box.querySelectorAll('input.note').forEach(inp=>{
    try{const v=localStorage.getItem('note_'+inp.dataset.code);if(v)inp.value=v;}catch(e){}
    inp.addEventListener('input',()=>{
      try{localStorage.setItem('note_'+inp.dataset.code,inp.value);}catch(e){}
      document.querySelectorAll(`input.note[data-code="${inp.dataset.code}"]`).forEach(o=>{if(o!==inp)o.value=inp.value;});
    });
  });
  box.querySelectorAll('input.rmk').forEach(inp=>{let v=null;try{v=localStorage.getItem('w2rmk_'+inp.dataset.wk);}catch(e){}if(v!==null)inp.value=v;inp.addEventListener('input',()=>{try{localStorage.setItem('w2rmk_'+inp.dataset.wk,inp.value);}catch(e){}});});
  WATCH.forEach(code=>fill(code));
}
function loadServerSnap(){
  return new Promise(function(res){
    if(!(location.protocol==='http:'||location.protocol==='https:')){res(false);return;}
    const s=document.createElement('script');s.src='/snapshot.js?t='+Date.now();
    s.onload=function(){res(true);};s.onerror=function(){res(false);};
    document.head.appendChild(s);
  });
}
function applyServerSnap(){
  if(typeof SRV_SNAP==='undefined')return false;
  const dt=(typeof SRV_SNAP_DATE!=='undefined'&&SRV_SNAP_DATE)?SRV_SNAP_DATE:(typeof GDATE!=='undefined'?GDATE:'');
  let n=0;
  for(const c in SRV_SNAP){if(!wanted.has(c))continue;const v=SRV_SNAP[c];if(v&&v[0]!=null){prices[c]={close:v[0],chg:(v[1]==null?null:v[1])};if(dt)pdate[c]=dt;if(v[2])market[c]=v[2];n++;}}
  if(n){wanted.forEach(fill);renderSummary();}
  return n>0;
}
/* ===== 伺服器共用儲存（觀察名單/備註/目標價等，所有裝置共用一份） ===== */
const SYNC_PREFIX=['watchlist','customStocks','mb2_','mb_note_','mbw_rmk_','tp3_','tp_','note_','w2rmk_','sumHidden'];
function _shouldSync(k){return SYNC_PREFIX.some(p=>k===p||k.indexOf(p)===0);}
const _origSet=localStorage.setItem.bind(localStorage);
let _pushT=null;
function collectStore(){const o={};for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(_shouldSync(k))o[k]=localStorage.getItem(k);}return o;}
function pushStore(){try{fetch('/store',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(collectStore())});}catch(e){}}
function fullSnapshot(){
  const o=collectStore();
  document.querySelectorAll('#list tbody tr').forEach(tr=>{
    const code=tr.dataset.code;if(!code)return;
    const lo=tr.querySelector('input.tp.lo'),av=tr.querySelector('input.tp.av'),hi=tr.querySelector('input.tp.hi'),nt=tr.querySelector('input.note');
    if(lo&&lo.value!=='')o['tp3_lo_'+code]=lo.value;
    if(av&&av.value!=='')o['tp3_av_'+code]=av.value;
    if(hi&&hi.value!=='')o['tp3_hi_'+code]=hi.value;
    if(nt)o['note_'+code]=nt.value;
  });
  return o;
}
function exportAll(){
  const rows=[['股號','股名','標籤','目標價低','目標價均','目標價高','注意事項','備註','觀察中']];
  const ws=new Set(typeof WATCH!=='undefined'?WATCH:[]);
  document.querySelectorAll('#list tbody tr').forEach(tr=>{
    const code=tr.dataset.code;if(!code)return;
    const name=tr.children[1]?tr.children[1].textContent.trim():'';
    const tag=tr.children[2]?tr.children[2].textContent.trim():'';
    const lo=(tr.querySelector('input.tp.lo')||{}).value||'';
    const av=(tr.querySelector('input.tp.av')||{}).value||'';
    const hi=(tr.querySelector('input.tp.hi')||{}).value||'';
    const note=(tr.querySelector('input.note')||{}).value||'';
    let rmk='';try{rmk=localStorage.getItem('w2rmk_'+code)||'';}catch(e){}
    const w=ws.has(code)?'是':'';
    if(lo||av||hi||(note&&note.trim())||(rmk&&rmk.trim())||w)rows.push([code,name,tag,lo,av,hi,note,rmk,w]);
  });
  if(rows.length===1){alert('目前沒有任何你輸入的資料');return;}
  const csv=rows.map(r=>r.map(x=>'"'+String(x).replace(/"/g,'""')+'"').join(',')).join('\r\n');
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  const d=new Date(),p=n=>String(n).padStart(2,'0');
  a.download='明爸我的資料_'+d.getFullYear()+p(d.getMonth()+1)+p(d.getDate())+'.csv';
  document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(a.href);
}
function exportData(){
  const blob=new Blob([JSON.stringify(fullSnapshot(),null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  const d=new Date(),p=n=>String(n).padStart(2,'0');
  a.download='明爸股價資料備份_'+d.getFullYear()+p(d.getMonth()+1)+p(d.getDate())+'.json';
  document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(a.href);
}
function importData(file){
  if(!file)return;
  const fr=new FileReader();
  fr.onload=function(){
    try{
      const o=JSON.parse(fr.result);
      if(!o||typeof o!=='object'){alert('檔案格式不正確');return;}
      let n=0;for(const k in o){if(_shouldSync(k)){localStorage.setItem(k,o[k]);n++;}}
      if(typeof applyStoreUI==='function')applyStoreUI();
      alert('已匯入 '+n+' 筆資料並套用（也會同步到伺服器）。');
    }catch(e){alert('匯入失敗：'+e);}
  };
  fr.readAsText(file);
}
function schedulePush(){if(!(location.protocol==='http:'||location.protocol==='https:'))return;if(_pushT)clearTimeout(_pushT);_pushT=setTimeout(pushStore,800);}
localStorage.setItem=function(k,v){_origSet(k,v);if(_shouldSync(k))schedulePush();};
let _lastStore=null;
async function pullStore(){
  if(!(location.protocol==='http:'||location.protocol==='https:'))return false;
  try{const r=await fetch('/store?t='+Date.now(),{cache:'no-store'});if(!r.ok)return false;const txt=await r.text();_lastStore=txt;const o=JSON.parse(txt);if(o&&typeof o==='object'){for(const k in o){if(_shouldSync(k))_origSet(k,o[k]);}return true;}}catch(e){}
  return false;
}
function applyStoreUI(){
  try{const nc=JSON.parse(localStorage.getItem('customStocks2')||'{}')||{};if(JSON.stringify(nc)!==JSON.stringify(CUSTOM)){CUSTOM=Array.isArray(nc)?{}:nc;Object.keys(CUSTOM).forEach(g=>(CUSTOM[g]||[]).forEach(c=>wanted.add(c[0])));render();wanted.forEach(fill);}}catch(e){}
  try{WATCH=JSON.parse(localStorage.getItem('watchlist2')||'[]')||[];}catch(e){}
  renderWatch();
  document.querySelectorAll('#list input.tp').forEach(inp=>{const cls=inp.classList.contains('lo')?'lo':inp.classList.contains('av')?'av':'hi';let v=null;try{v=localStorage.getItem('tp3_'+cls+'_'+inp.dataset.code);if(v===null&&cls==='av')v=localStorage.getItem('tp_'+inp.dataset.code);}catch(e){}if(v)inp.value=v;else if(typeof DEFAULT_TP3!=='undefined'&&DEFAULT_TP3[inp.dataset.code]&&DEFAULT_TP3[inp.dataset.code][cls]!=null)inp.value=DEFAULT_TP3[inp.dataset.code][cls];else inp.value='';});
  document.querySelectorAll('#list input.note').forEach(inp=>{let v=null;try{v=localStorage.getItem('note_'+inp.dataset.code);}catch(e){}inp.value=v||'';});
  wanted.forEach(c=>upside(c));
}
async function pollStore(){
  if(!(location.protocol==='http:'||location.protocol==='https:'))return;
  if(document.activeElement&&document.activeElement.tagName==='INPUT')return;
  try{const r=await fetch('/store?t='+Date.now(),{cache:'no-store'});if(!r.ok)return;const txt=await r.text();if(txt===_lastStore)return;_lastStore=txt;const o=JSON.parse(txt);if(o&&typeof o==='object'){for(const k in o){if(_shouldSync(k))_origSet(k,o[k]);}applyStoreUI();}}catch(e){}
}
(async function(){
  await pullStore();
  render(); applySnap(); renderWatch(); initMA();
  loadServerSnap().then(function(ok){if(ok){applyServerSnap();try{if(typeof SRV_SNAP_DATE!=='undefined'&&SRV_SNAP_DATE&&SRV_SNAP_DATE!==GDATE)saveSnapshot();}catch(e){}}});
  load();
  try{if(localStorage.getItem('sumHidden')==='1'){document.getElementById('summary').style.display='none';document.getElementById('sumBtn').textContent='顯示分類漲跌幅';}}catch(e){}
})();
setInterval(pollStore,8000);
</script>
