let _sortKey=null,_sortDir=1;
function _snum(v){const n=parseFloat(String(v==null?'':v).replace(/,/g,''));return isNaN(n)?null:n;}
function _iv(tr,sel){const el=tr.querySelector(sel);return el?num(el.value):null;}
function sortVal(tr,key){
  const code=tr.dataset.code; const p=prices[code]||{};
  if(key==='code'){const n=_snum(code);return n!=null?n:code;}
  if(key==='name')return tr.children[1]?tr.children[1].textContent.trim():'';
  if(key==='close')return p.close;
  if(key==='chg')return p.chg;
  if(key==='chgpct'){if(p.close==null||p.chg==null||(p.close-p.chg)===0)return null;return p.chg/(p.close-p.chg)*100;}
  if(key==='target'||key==='profit'){
    const hi=_iv(tr,'input.hi'), lo=_iv(tr,'input.lo'); const t=(hi!=null)?hi:lo;
    if(key==='target')return t;
    if(p.close==null||t==null)return null;
    return (t/p.close-1)*100;
  }
  if(key==='note'){const el=tr.querySelector('input.ntg');return el?el.value.trim():'';}
  return null;
}
function _cmp(a,b,dir){
  const ae=(a==null||a===''),be=(b==null||b==='');
  if(ae&&be)return 0; if(ae)return 1; if(be)return -1;
  if(typeof a==='number'&&typeof b==='number')return (a-b)*dir;
  return String(a).localeCompare(String(b),'zh-Hant')*dir;
}
function sortTable(thEl){

    const body=tb.querySelector('tbody'); if(!body)return;
    const rows=[...body.querySelectorAll('tr')];
    rows.sort((a,b)=>_cmp(sortVal(a,key),sortVal(b,key),_sortDir));

  });

    const base=t.getAttribute('data-label')||t.textContent.replace(/[ \u25b2\u25bc]+$/,'');

}

    const days=K.d.filter(x=>x[0]>=startTs&&x[0]<=r.ts);
    if(!days.length)continue;
    const bar=[startTs,days[0][1],Math.max(...days.map(x=>x[2])),Math.min(...days.map(x=>x[3])),days[days.length-1][4],days.reduce((s,x)=>s+x[5],0)];
    const last=arr[arr.length-1];
    if(last[0]>=startTs)arr[arr.length-1]=bar;else arr.push(bar);
  }
}
function mergeDailyBars(bars){
  let upd=0,dateStr='';
  for(const cd in bars){
    const b=bars[cd],K=KDATA[cd];if(!K||!K.d||!K.d.length)continue;
    const r=rocTs(b.d);
    dateStr=r.y+'/'+String(r.m).padStart(2,'0')+'/'+String(r.d).padStart(2,'0');
    const bar=[r.ts,b.o,b.h,b.l,b.c,b.v];
    const last=K.d[K.d.length-1];
    if(last[0]===r.ts)K.d[K.d.length-1]=bar;
    else if(r.ts>last[0])K.d.push(bar);
    else continue;
    rebuildAgg(K,r);upd++;
    prices[cd]={close:b.c,chg:b.chg};pdate[cd]=dateStr;fill(cd);
  }
  return {upd:upd,dateStr:dateStr};
}

  try{return new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Taipei'}).replace(/-/g,'/');}catch(e){return '';}
}

function csvParse(txt){
  const rows=[];let cur=[],s='',q=false;
  for(let i=0;i<txt.length;i++){const ch=txt[i];
    if(q){if(ch==='"'){if(txt[i+1]==='"'){s+='"';i++;}else q=false;}else s+=ch;}
    else if(ch==='"')q=true;
    else if(ch===','){cur.push(s);s='';}
    else if(ch==='\n'||ch==='\r'){if(s!==''||cur.length){cur.push(s);rows.push(cur);cur=[];s='';}}
    else s+=ch;}
  if(s!==''||cur.length){cur.push(s);rows.push(cur);}
  return rows;
}

  let h='<table><colgroup><col style="width:64px"><col style="width:120px"><col style="width:90px"><col style="width:84px"><col style="width:64px"><col style="width:90px"><col style="width:190px"><col style="width:160px"><col style="width:48px"><col style="width:48px"><col style="width:150px"><col style="width:210px"><col style="width:60px"></colgroup><thead><tr><th>代號</th><th>名稱</th><th class="num">收盤價</th><th class="num">漲跌</th><th class="num">漲跌幅</th><th class="num">資料日期</th><th class="num">目標價區間</th><th class="num">可獲利區間</th><th>法人</th><th>資券</th><th>注意事項</th><th>備註</th><th>移除</th></tr></thead><tbody>';
  WATCH.forEach(code=>{
    const info=STKINFO[code]||{name:code,lo:null,hi:null,note:'',k:'_'+code};const wk=info.k;
    h+=`<tr data-code="${code}" data-k="${wk}">`
      +`<td class="codecell"><a class="stk" href="javascript:void(0)" onclick="openChart('${code}','${esc(info.name)}')">${code}</a></td>`
      +`<td><a class="stk" href="javascript:void(0)" onclick="openChart('${code}','${esc(info.name)}')">${esc(info.name)}</a></td>`
      +`<td class="num" data-p="${code}">…</td>`
      +`<td class="num" data-c="${code}"></td><td class="num" data-cp="${code}"></td>`
      +`<td class="num" data-dt="${code}" style="font-size:11px;color:var(--mut)"></td>`
      +`<td class="num"><input class="tg lo" data-k="${wk}" data-d="${info.lo??''}" inputmode="decimal" placeholder="低"><span class="tilde">~</span><input class="tg hi" data-k="${wk}" data-d="${info.hi??''}" inputmode="decimal" placeholder="高"></td>`
      +`<td class="num" data-u="${wk}"></td>`
      +`<td><a href="${yurl2(code,'institutional-trading')}" target="_blank" style="font-size:12px;color:var(--acc)">法人</a></td><td><a href="${yurl2(code,'margin')}" target="_blank" style="font-size:12px;color:var(--acc)">資券</a></td>`
      +`<td class="note"><input class="ntg" data-k="${info.k}" data-d="${esc(info.note).replace(/"/g,'&quot;')}" placeholder=""></td>`
      +`<td><input class="rmk" data-wk="${code}" placeholder=""></td>`
      +`<td><button class="rmw" onclick="removeWatch('${code}')">移除</button></td></tr>`;
  });
  h+='</tbody></table>';
  box.innerHTML=h;
  box.querySelectorAll('input.tg').forEach(inp=>{const isLo=inp.classList.contains('lo');let v=null;try{v=localStorage.getItem('mb2_'+inp.dataset.k+(isLo?'_lo':'_hi'));}catch(e){}inp.value=(v!==null&&v!=='')?v:(v===''?'':inp.dataset.d);inp.addEventListener('input',()=>{try{localStorage.setItem('mb2_'+inp.dataset.k+(isLo?'_lo':'_hi'),inp.value);}catch(e){}document.querySelectorAll('input.tg.'+(isLo?'lo':'hi')+'[data-k="'+inp.dataset.k+'"]').forEach(o=>{if(o!==inp)o.value=inp.value;});profit(inp.dataset.k);});});
  box.querySelectorAll('input.ntg').forEach(inp=>{let v=null;try{v=localStorage.getItem('mb_note_'+inp.dataset.k);}catch(e){}inp.value=(v!==null)?v:inp.dataset.d;inp.addEventListener('input',()=>{try{localStorage.setItem('mb_note_'+inp.dataset.k,inp.value);}catch(e){}document.querySelectorAll('input.ntg[data-k="'+inp.dataset.k+'"]').forEach(o=>{if(o!==inp)o.value=inp.value;});});});
  box.querySelectorAll('input.rmk').forEach(inp=>{let v=null;try{v=localStorage.getItem('mbw_rmk_'+inp.dataset.wk);}catch(e){}if(v!==null)inp.value=v;inp.addEventListener('input',()=>{try{localStorage.setItem('mbw_rmk_'+inp.dataset.wk,inp.value);}catch(e){}});});
  WATCH.forEach(code=>fill(code));
}
function loadServerSnap(){
  return new Promise(function(res){
    if(!(location.protocol==='http:'||location.protocol==='https:')){res(false);return;}
    const s=document.createElement('script');s.src='/snapshot.js?t='+Date.now();
    s.onload=function(){res(true);};s.onerror=function(){res(false);};
    document.head.appendChild(s);
  });
}
function applyServerSnap(){
  if(typeof SRV_SNAP==='undefined')return false;
  const dt=(typeof SRV_SNAP_DATE!=='undefined'&&SRV_SNAP_DATE)?SRV_SNAP_DATE:(typeof GDATE!=='undefined'?GDATE:'');
  let n=0;
  for(const c in SRV_SNAP){if(!wanted.has(c))continue;const v=SRV_SNAP[c];if(v&&v[0]!=null){prices[c]={close:v[0],chg:(v[1]==null?null:v[1])};if(dt)pdate[c]=dt;if(v[2])market[c]=v[2];n++;}}
  if(n){wanted.forEach(fill);renderSummary();}
  return n>0;
}
/* ===== 伺服器共用儲存（觀察名單/備註/目標價等，所有裝置共用一份） ===== */
const SYNC_PREFIX=['watchlist','mb2_','mb_note_','mbw_rmk_','tp3_','tp_','note_','w2rmk_','sumHidden'];
function _shouldSync(k){return SYNC_PREFIX.some(p=>k===p||k.indexOf(p)===0);}
const _origSet=localStorage.setItem.bind(localStorage);
let _pushT=null;
function collectStore(){const o={};for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(_shouldSync(k))o[k]=localStorage.getItem(k);}return o;}
function pushStore(){try{fetch('/store',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(collectStore())});}catch(e){}}
function fullSnapshot(){
  const o=collectStore();
  document.querySelectorAll('#list tbody tr').forEach(tr=>{
    const k=tr.dataset.k;if(!k)return;
    const lo=tr.querySelector('input.lo'),hi=tr.querySelector('input.hi'),nt=tr.querySelector('input.ntg');
    if(lo)o['mb2_'+k+'_lo']=lo.value;
    if(hi)o['mb2_'+k+'_hi']=hi.value;
    if(nt)o['mb_note_'+k]=nt.value;
  });
  return o;
}
function exportAll(){
  const rows=[['股號','股名','分類','目標價低','目標價高','注意事項','備註','觀察中']];
  const ws=new Set(typeof WATCH!=='undefined'?WATCH:[]);
  document.querySelectorAll('#list tbody tr').forEach(tr=>{
    const code=tr.dataset.code;if(!code)return;
    const det=tr.closest('details');let cat='';if(det){const s=det.querySelector('summary');if(s)cat=s.textContent.replace(/\s*\d+\s*檔\s*$/,'').trim();}
    const name=tr.children[1]?tr.children[1].textContent.trim():'';
    const lo=(tr.querySelector('input.lo')||{}).value||'';
    const hi=(tr.querySelector('input.hi')||{}).value||'';
    const note=(tr.querySelector('input.ntg')||{}).value||'';
    let rmk='';try{rmk=localStorage.getItem('mbw_rmk_'+code)||'';}catch(e){}
    const w=ws.has(code)?'是':'';
    if(lo||hi||(note&&note.trim())||(rmk&&rmk.trim())||w)rows.push([code,name,cat,lo,hi,note,rmk,w]);
  });
  if(rows.length===1){alert('目前沒有任何你輸入的資料');return;}
  const csv=rows.map(r=>r.map(x=>'"'+String(x).replace(/"/g,'""')+'"').join(',')).join('\r\n');
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  const d=new Date(),p=n=>String(n).padStart(2,'0');
  a.download='明爸我的資料_'+d.getFullYear()+p(d.getMonth()+1)+p(d.getDate())+'.csv';
  document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(a.href);
}
function exportData(){
  const blob=new Blob([JSON.stringify(fullSnapshot(),null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  const d=new Date(),p=n=>String(n).padStart(2,'0');
  a.download='明爸股價資料備份_'+d.getFullYear()+p(d.getMonth()+1)+p(d.getDate())+'.json';
  document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(a.href);
}
function importData(file){
  if(!file)return;
  const fr=new FileReader();
  fr.onload=function(){
    try{
      const o=JSON.parse(fr.result);
      if(!o||typeof o!=='object'){alert('檔案格式不正確');return;}
      let n=0;for(const k in o){if(_shouldSync(k)){localStorage.setItem(k,o[k]);n++;}}
      if(typeof applyStoreUI==='function')applyStoreUI();
      alert('已匯入 '+n+' 筆資料並套用（也會同步到伺服器）。');
    }catch(e){alert('匯入失敗：'+e);}
  };
  fr.readAsText(file);
}
function schedulePush(){if(!(location.protocol==='http:'||location.protocol==='https:'))return;if(_pushT)clearTimeout(_pushT);_pushT=setTimeout(pushStore,800);}
localStorage.setItem=function(k,v){_origSet(k,v);if(_shouldSync(k))schedulePush();};
let _lastStore=null;
async function pullStore(){
  if(!(location.protocol==='http:'||location.protocol==='https:'))return false;
  try{const r=await fetch('/store?t='+Date.now(),{cache:'no-store'});if(!r.ok)return false;const txt=await r.text();_lastStore=txt;const o=JSON.parse(txt);if(o&&typeof o==='object'){for(const k in o){if(_shouldSync(k))_origSet(k,o[k]);}return true;}}catch(e){}
  return false;
}
function applyStoreUI(){
  try{WATCH=JSON.parse(localStorage.getItem('watchlist')||'[]')||[];}catch(e){}
  renderWatch();
  document.querySelectorAll('#list input.tg').forEach(inp=>{const isLo=inp.classList.contains('lo');let v=null;try{v=localStorage.getItem('mb2_'+inp.dataset.k+(isLo?'_lo':'_hi'));}catch(e){}inp.value=(v!==null&&v!=='')?v:(v===''?'':inp.dataset.d);});
  document.querySelectorAll('#list input.ntg').forEach(inp=>{let v=null;try{v=localStorage.getItem('mb_note_'+inp.dataset.k);}catch(e){}inp.value=(v!==null)?v:inp.dataset.d;});
  document.querySelectorAll('#list tr[data-k]').forEach(tr=>profit(tr.dataset.k));
}
async function pollStore(){
  if(!(location.protocol==='http:'||location.protocol==='https:'))return;
  if(document.activeElement&&document.activeElement.tagName==='INPUT')return; // 你正在輸入就先不打擾
  try{const r=await fetch('/store?t='+Date.now(),{cache:'no-store'});if(!r.ok)return;const txt=await r.text();if(txt===_lastStore)return;_lastStore=txt;const o=JSON.parse(txt);if(o&&typeof o==='object'){for(const k in o){if(_shouldSync(k))_origSet(k,o[k]);}applyStoreUI();}}catch(e){}
}
(async function(){
  await pullStore();
  render(); renderWatch(); initMA(); renderSummary();
  loadServerSnap().then(function(ok){if(ok){applyServerSnap();try{if(typeof SRV_SNAP_DATE!=='undefined'&&SRV_SNAP_DATE&&SRV_SNAP_DATE!==GDATE)saveSnapshot();}catch(e){}}});
  load();
  try{if(localStorage.getItem('sumHidden')==='1'){document.getElementById('summary').style.display='none';document.getElementById('sumBtn').textContent='顯示分類漲跌幅';}}catch(e){}
})();
setInterval(pollStore,8000);
</script>
